name: Update Deployment
description: "Updates a Kubernetes Deployment, DaemonSet, or StatefulSet with a new Image tag."
inputs:
  k8s-config:
    description: "Kubernetes Configuration"
    required: true
  type:
    description: "Resource Type (deployment, daemonset, statefulset)"
    required: false
    default: deployment
  deployment:
    description: "Update the resource, if provided"
    required: false
  container:
    description: "Container Name"
    required: false
  registry:
    description: "Container Registry"
    required: false
    default: europe-west1-docker.pkg.dev
  image:
    description: "Image Name"
    required: false
  tag:
    description: "Image Tag"
    required: false
    default: "${GITHUB_SHA::7}"
  skipSetup:
    description: "Skip Setup, if provided"
    required: false
runs:
  using: "composite"
  steps:
    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      if: "${{ !inputs.skipSetup }}"

    - name: Prepare Context
      uses: azure/k8s-set-context@v1
      with:
        kubeconfig: ${{ inputs.k8s-config }}
      if: "${{ !inputs.skipSetup }}"

    # TODO: Make namespace configurable.

    - name: Update Image
      shell: bash
      run: "kubectl set image ${{ inputs.type }}/${{ inputs.deployment }} ${{ inputs.container}}=${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.tag }}"
      if: "${{ inputs.deployment }}"

    - name: Verify Rollout
      shell: bash
      run: "kubectl rollout status ${{ inputs.type }}/${{ inputs.deployment }}"
      if: "${{ inputs.deployment }}"
